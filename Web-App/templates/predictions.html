{% extends "index.html" %}

{% block  body%}
<div class="row">
    <div class="col">
        <img class="img-fluid border border-primary" src="/static/media/fixed_img.jpg" alt="fixed and wrapped image">
    </div>
    <div class="col"></div>
        <img class="img-fluid border border-primary" src="/static/media/BoundingBox.jpg" alt="Bounding Box image">

</div>

<br> <br>
<div class="row">
    <table class="table table-hover table-dark">
        <thead>
            <tr>
                <th>Entities</th>
                <th>Extracted Text</th>
            </tr>
        </thead>
        <tbody>
            {% for key,value in results.items() %}
            <tr>
                <td>{{key}}</td>
                <td>{{value}}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>


{% endblock  %}
