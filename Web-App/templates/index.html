<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Bill Wise</title>
    <style>
        :root {
            --bg:       #080809;
            --bg2:      #0f0f11;
            --surface:  #141416;
            --surface2: #1c1c1f;
            --border:   rgba(255,255,255,0.06);
            --border2:  rgba(255,255,255,0.12);
            --accent:   #d4ff47;
            --accent2:  #a8cc30;
            --text:     #ededf0;
            --muted:    #5a5a6a;
            --muted2:   #8a8a9a;
            --danger:   #ff4757;
            --success:  #2ed573;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono:    'DM Mono', monospace;
            --font-body:    'DM Sans', sans-serif;
            --radius:   12px;
            --ease:     cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.65;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .navbar {
            background: rgba(8,8,9,0.92) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--text) !important;
            letter-spacing: 0.05em;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-badge {
            background: var(--accent);
            color: #000;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.08em;
            margin-top: 2px;
        }

        .navbar-nav .nav-link {
            color: var(--muted2) !important;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 0.45rem 1rem !important;
            border-radius: 8px;
            transition: all 0.2s var(--ease);
            letter-spacing: 0.01em;
        }

        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: var(--text) !important;
            background: var(--surface2);
        }

        .nav-scan-btn {
            background: var(--accent) !important;
            color: #000 !important;
            font-weight: 600 !important;
            font-size: 0.82rem !important;
            padding: 0.45rem 1.1rem !important;
            border-radius: 8px !important;
            letter-spacing: 0.02em;
            transition: all 0.2s var(--ease) !important;
        }

        .nav-scan-btn:hover {
            background: var(--accent2) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(212,255,71,0.25) !important;
        }

        .navbar-toggler {
            border-color: var(--border2) !important;
            padding: 0.4rem 0.6rem;
        }
        .navbar-toggler-icon { filter: invert(0.8); }

        main { flex: 1; }

        footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 2.5rem 0 2rem;
            margin-top: auto;
        }

        .footer-brand {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 0.05em;
            color: var(--text);
        }

        .footer-tagline {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            margin-top: 0.2rem;
        }

        .footer-links {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .footer-link {
            color: var(--muted2);
            text-decoration: none;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s;
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .footer-link:hover { color: var(--accent); border-color: rgba(212,255,71,0.3); }

        .footer-copy {
            color: var(--muted);
            font-size: 0.75rem;
            font-family: var(--font-mono);
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .page-fade {
            animation: pageFade 0.4s var(--ease) both;
        }
        @keyframes pageFade {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-receipt-cutoff" style="color:var(--accent);font-size:1.2rem"></i>
            BILL WISE
            <span class="brand-badge">v2.0</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto align-items-center gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                        <i class="bi bi-house me-1"></i>Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="/about">
                        <i class="bi bi-info-circle me-1"></i>About
                    </a>
                </li>
                <li class="nav-item ms-1">
                    <a class="nav-link nav-scan-btn" href="/">
                        <i class="bi bi-scan me-1"></i>Scan Invoice
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="page-fade">
    {% block body %}{% endblock %}
</main>

<footer>
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-4">
            <div>
                <div class="footer-brand">BILL WISE</div>
                <div class="footer-tagline">OCR + NER INVOICE EXTRACTION ENGINE</div>
            </div>
            <div class="footer-links">
                <a class="footer-link" href="https://github.com/Younes-Barkat" target="_blank">
                    <i class="bi bi-github"></i> GitHub
                </a>
                <a class="footer-link" href="https://linktr.ee/Younes_Barkat" target="_blank">
                    <i class="bi bi-link-45deg"></i> Linktree
                </a>
                <a class="footer-link" href="/about">
                    <i class="bi bi-info-circle"></i> About
                </a>
            </div>
        </div>
        <div class="footer-copy d-flex justify-content-between flex-wrap gap-2">
            <span>© 2026 Younes Barkat — All rights reserved</span>
            <span style="color:var(--muted)">Built with Flask · spaCy · Tesseract · OpenCV</span>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{{ url_for('static', filename='js/doc_scan.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
